<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
    <head th:replace="~{fragments :: head('Регистрация | Дачник.ру')}"></head>

<body class="bg-light">
    <header th:replace="~{fragments :: header('reg')}"></header>
    <div th:if="${error}" class="alert alert-danger container mt-3" th:text="${error}"></div>
<div th:if="${success}" class="alert alert-success container mt-3">
    Регистрация успешна! Теперь вы можете войти.
</div>
    <!-- Основное содержимое -->
    <div class="container py-5">
        <div class="register-container mx-auto">
            <div class="register-card card overflow-hidden">
                <!-- Заголовок -->
                <div class="card-header register-header bg-success text-white text-center py-4">
                    <h3><i class="bi bi-person-plus"></i> Создайте аккаунт</h3>
                    <p class="mb-0">Присоединяйтесь к сообществу дачников</p>
                </div>
                
                <!-- Тело формы -->
                <div class="card-body p-4 p-md-5">
                    <!-- Форма регистрации -->
                    <form id="registerForm" th:action="@{/reg}" method="post" th:object="${user}">
                        <!-- Имя -->
                        <div class="mb-4 position-relative">
                            <i class="bi bi-person form-icon"></i>
                            <input type="text" class="form-control form-input" id="firstname" th:field="*{firstname}" name="firstname" autocomplete="given-name" placeholder="Имя" required>
                        </div>
                        
                        <!-- Фамилия -->
                        <div class="mb-4 position-relative">
                            <i class="bi bi-person form-icon"></i>
                            <input type="text" class="form-control form-input" id="secondname" th:field="*{secondname}" name="secondname" autocomplete="family-name" placeholder="Фамилия">
                        </div>
                        
                        <!-- Email -->
                        <div class="mb-4 position-relative">
                            <i class="bi bi-envelope form-icon"></i>
                            <input type="email" class="form-control form-input" id="email" th:field="*{email}" name="email" autocomplete="email" placeholder="Email" required>
                        </div>
                        
                        <!-- Телефон -->
                        <div class="mb-4 position-relative">
                            <i class="bi bi-phone form-icon"></i>
                            <input type="tel" class="form-control form-input" id="phone" th:field="*{phone}" name="phone" autocomplete="tel" placeholder="Телефон">
                        </div>
                        
                        <!-- Пароль -->
                        <div class="mb-4 position-relative">
                            <i class="bi bi-lock form-icon"></i>
                            <input type="password" class="form-control form-input" id="password" th:field="*{password}" name="password" autocomplete="new-password" placeholder="Пароль" required>
                            <i class="bi bi-eye password-toggle" id="togglePassword"></i>
                        </div>
                        
                        <!-- Подтверждение пароля -->
                        <div class="mb-4 position-relative">
                            <i class="bi bi-lock form-icon"></i>
                            <input type="password" class="form-control form-input" id="passwordConfirm" name="confirmPassword" autocomplete="new-password" placeholder="Подтвердите пароль" required>
                        </div>
                        
                        <!-- Чекбоксы -->
                        <div class="mb-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="agreeTerms" required>
                                <label class="form-check-label" for="agreeTerms">
                                    Я принимаю <a href="#">условия использования</a> и <a href="#">политику конфиденциальности</a>
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="newsletter">
                                <label class="form-check-label" for="newsletter">
                                    Получать полезные советы для дачников
                                </label>
                            </div>
                        </div>
                        
                        <!-- Кнопка регистрации -->
                        <button type="submit" class="btn btn-success w-100 py-2 mb-3">
                            <i class="bi bi-person-plus"></i> Зарегистрироваться
                        </button>
                        
                        <!-- Разделитель -->
                        <div class="divider">
                            или
                        </div>
                        
                        <!-- Социальные сети -->
                        <div class="row g-2 mb-4">
                            <div class="col-md-6">
                                <button type="button" class="btn btn-google w-100">
                                    <i class="bi bi-google"></i> Google
                                </button>
                            </div>
                            <div class="col-md-6">
                                <button type="button" class="btn btn-vk w-100">
                                    <i class="bi bi-share"></i> ВКонтакте
                                </button>
                            </div>
                        </div>
                        
                        <!-- Ссылка на вход -->
                        <div class="text-center">
                            Уже есть аккаунт? <a href="/auth" class="text-success">Войти</a>
                        </div>
                    </form>
                </div>
            </div>
            
            <!-- Дополнительная информация -->
            <div class="text-center mt-4 text-muted">
                <p>Регистрируясь, вы получаете возможность:</p>
                <ul class="list-unstyled">
                    <li><i class="bi bi-check-circle text-success"></i> Публиковать объявления</li>
                    <li><i class="bi bi-check-circle text-success"></i> Сохранять избранные предложения</li>
                    <li><i class="bi bi-check-circle text-success"></i> Общаться с другими дачниками</li>
                </ul>
            </div>
        </div>
    </div>

    <!-- Подвал -->
    <footer th:replace="~{fragments :: footer}"></footer>
    <div th:replace="~{fragments :: scripts}"></div>
    <style>
        .register-container { max-width: 600px; }
        .register-card { border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .register-header { border-radius: 15px 15px 0 0 !important; }
        .form-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #6c757d; }
        .form-input { padding-left: 40px; }
        .divider { display: flex; align-items: center; text-align: center; color: #6c757d; margin: 20px 0; }
        .divider::before, .divider::after { content: ""; flex: 1; border-bottom: 1px solid #dee2e6; }
        .divider::before { margin-right: 10px; }
        .divider::after { margin-left: 10px; }
        .social-btn { display: flex; align-items: center; justify-content: center; padding: 10px; border-radius: 8px; font-weight: 500; }
        .social-btn i { font-size: 1.2rem; margin-right: 10px; }
        .btn-google { background-color: #fff; color: #757575; border: 1px solid #ddd; }
        .btn-google:hover { background-color: #f8f9fa; }
        .btn-vk { background-color: #0077FF; color: white; }
        .btn-vk:hover { background-color: #0066DD; color: white; }
        .password-toggle { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #6c757d; }
    </style>
    <script>
        // Переключение видимости пароля
        const togglePassword = document.querySelector('#togglePassword');
        const password = document.querySelector('#password');
        
        togglePassword.addEventListener('click', function() {
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            this.classList.toggle('bi-eye');
            this.classList.toggle('bi-eye-slash');
        });
        
        // Валидация формы
        //document.getElementById('registerForm').addEventListener('submit', function(e) {
        
            /*const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (password !== confirmPassword) {
                e.preventDefault();
                alert('Пароли не совпадают!');
                return;
            }*/
            
            // Здесь можно добавить AJAX-запрос для отправки данных на сервер
            //alert('Регистрация прошла успешно! Добро пожаловать!');
            // window.location.href = 'profile.html';
        //});
        
        // Маска для телефона
        document.getElementById('phone').addEventListener('input', function(e) {
            let x = e.target.value.replace(/\D/g, '').match(/(\d{0,1})(\d{0,3})(\d{0,3})(\d{0,2})(\d{0,2})/);
            e.target.value = !x[2] ? x[1] : '+' + x[1] + ' (' + x[2] + ') ' + x[3] + (x[4] ? '-' + x[4] : '') + (x[5] ? '-' + x[5] : '');
        });
    </script>
</body>
</html>
