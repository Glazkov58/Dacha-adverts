spring.application.name=services

spring.mvc.static-path-pattern=/uploads/**
spring.web.resources.static-locations=file:${upload.path},classpath:/static/
#spring.web.resources.static-locations=classpath:/static/,file:${upload.path}

spring.datasource.url=jdbc:mysql://localhost:3306/dacha?useSSL=false
spring.datasource.username=root
spring.datasource.password=
#spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

spring.servlet.multipart.enabled=true
spring.servlet.multipart.file-size-threshold=2KB
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=50MB
spring.servlet.multipart.file-size-threshold=2MB
spring.servlet.multipart.location=${java.io.tmpdir}
upload.path=./services1/uploads
#upload.path=uploads
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
spring.security.user.name=...
spring.security.user.password=...

server.port=8090