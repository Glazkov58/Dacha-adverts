<!DOCTYPE html>
<html lang="ru"xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments :: head('Главная — Дачник.ру')"></head>
<body>

<!-- Подключаем хедер -->
<header th:replace="fragments :: header('home')"></header>


    <!-- Основное содержимое -->
    <div class="container mt-4">
        <div class="row">
            <!-- Боковая панель с категориями -->
            <div class="col-md-3 mb-4">
                <div class="card">
                    <div class="card-header bg-success text-white">
                        <i class="bi bi-list-ul"></i> Категории
                    </div>
                    <div class="list-group list-group-flush">
                        <a href="#" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
                            Продажа участков
                            <span class="badge bg-primary rounded-pill">24</span>
                        </a>
                        <a href="#" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
                            Аренда дач
                            <span class="badge bg-primary rounded-pill">56</span>
                        </a>
                        <a href="#" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
                            Саженцы
                            <span class="badge bg-primary rounded-pill">42</span>
                        </a>
                        <a href="#" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
                            Инструменты
                            <span class="badge bg-primary rounded-pill">31</span>
                        </a>
                        <a href="#" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
                            Услуги
                            <span class="badge bg-primary rounded-pill">18</span>
                        </a>
                    </div>
                </div>
                
                <div class="card mt-4">
                    <div class="card-header bg-info text-white">
                        <i class="bi bi-info-circle"></i> Полезные советы
                    </div>
                    <div class="card-body">
                        <p class="small">Проверяйте объявления перед покупкой. Встречайтесь в людных местах для безопасности.</p>
                        <button class="btn btn-sm btn-outline-info">Читать больше</button>
                    </div>
                </div>
            </div>
            
            <!-- Список объявлений -->
            <div class="col-md-9">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h2>Последние объявления</h2>
                    <button class="btn btn-success">
                        <a class="nav-link" href="/addadvert"> <i class="bi bi-plus-circle"></i> Добавить объявление</a>
                    </button>
                </div>
                
                <!-- Фильтры -->
                 <form method="get" action="/filter">
                <div class="card mb-4">
                    <div class="card-body">
                        <div class="row g-2">
                            <div class="col-md-4">
                                <select class="form-select" name="category">
                                    <option selected value="">Все категории</option>
                                    <option value="Продажа">Продажа участков</option>
                                    <option value="Аренда">Аренда дач</option>
                                    <option value="Саженцы">Саженцы</option>
                                    <option value="Инструменты">Инструменты</option>
                                    <option value="Услуги">Услуги</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <select class="form-select" name="region">
                                    <option selected value="">Любой район</option>
                                    <option>Северный</option>
                                    <option>Южный</option>
                                    <option>Западный</option>
                                    <option>Восточный</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <button class="btn btn-primary w-100"><i class="bi bi-funnel" type="submit"></i> Фильтровать</button>
                            </div>
                        </div>
                    </div>
                </div>
                 </form>
                
                <!-- Объявления -->
                <div class="row row-cols-1 row-cols-md-2 g-4">
                    <!-- Объявление 1 -->
                    <div class="col" th:each="dacha : ${ads}">
                        <div class="card h-100">
                            <div class="position-relative">
                                <img th:if="${not #lists.isEmpty(dacha.photoPaths)}" th:src="@{'/uploads/' + ${dacha.photoPaths[0]}}" 
                                     class="card-img-top" alt="Фото объекта" style="height: 200px; object-fit: cover;">
                                <img th:unless="${dacha.photoPaths}" src="/static/images/no-image.jpg" 
                                     class="card-img-top" alt="Нет фото" style="height: 200px; object-fit: cover;">
                                <span class="position-absolute top-0 end-0 bg-danger text-white p-2">Срочно!</span>
                            </div>
                            <div class="card-body">
                                <a th:href="|/card/${dacha.getId()}|" class="nav-link">
                                    <h5 class="card-title" th:text="${dacha.getAdTitle()}"></h5>
                                    <p class="card-text" th:text="${dacha.getAdDescription()}"></p>
                                    <div class="d-flex justify-content-between align-items-center">
                                        <span class="badge bg-success" th:text="${dacha.getAdCategory}">Продажа</span>
                                        <h5 class="text-success mb-0" th:text="${#numbers.formatInteger(dacha.getAdPrice(), 0, 'WHITESPACE')} + '₽'"></h5>
                                    </div>
                                </a>
                            </div>
                            <div class="card-footer bg-transparent">
                                <small class="text-muted"><i class="bi bi-geo-alt" th:text="|${dacha.getAdCity()} ${dacha.getAdAddress()}|"></i></small>
                                <small class="text-muted float-end"><i class="bi bi-clock"></i> 2 дня назад</small>
                            </div>
                        </div>
                    </div>
                <!-- Пагинация -->
                <nav class="mt-4">
                    <ul class="pagination justify-content-center">
                        <li class="page-item disabled">
                            <a class="page-link" href="#" tabindex="-1">Назад</a>
                        </li>
                        <li class="page-item active"><a class="page-link" href="#">1</a></li>
                        <li class="page-item"><a class="page-link" href="#">2</a></li>
                        <li class="page-item"><a class="page-link" href="#">3</a></li>
                        <li class="page-item">
                            <a class="page-link" href="#">Вперед</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>

    <!-- Подвал -->
    <!-- Подключаем футер -->
    <footer th:replace="fragments :: footer"></footer>

    <!-- Bootstrap 5 JS -->
    <div th:replace="fragments :: scripts"></div>
</body>
</html>
