<!DOCTYPE html>
<html lang="ru"xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Авторизация — Дачник.ру')}">
</head>
<body class="bg-light">
    <header th:replace="~{fragments :: header('auth')}"></header>
    <div th:if="${error}" class="alert alert-danger mt-3 container" th:text="${error}"></div>
    
    <!-- Основное содержимое -->
    <div class="container py-5">
        <div class="login-container mx-auto">
            <div class="login-card card">
                <!-- Заголовок -->
                <div class="card-header login-header text-white text-center py-4">
                    <h3><i class="bi bi-box-arrow-in-right"></i> Вход в аккаунт</h3>
                    <p class="mb-0">Войдите, чтобы управлять своими объявлениями</p>
                </div>
                
                <!-- Тело формы -->
                <div class="card-body p-4 p-md-5">
                    <!-- Форма входа -->
                    <form id="loginForm" th:action="@{/auth}" th:object="${authDto}" method="post">
                        <!-- Email -->
                        <div class="mb-4 position-relative">
                            <i class="bi bi-envelope form-icon"></i>
                            <input type="email" class="form-control form-input" th:field="*{email}"  id="email" name="email"
               autocomplete="email" placeholder="Email" required>
                        </div>
                        
                        <!-- Пароль -->
                        <div class="mb-4 position-relative">
                            <i class="bi bi-lock form-icon"></i>
                            <input type="password" class="form-control form-input"  th:field="*{password}" id="loginPassword" name="password" autocomplete="current-password" placeholder="Пароль" required>
                            <i class="bi bi-eye password-toggle" id="toggleLoginPassword"></i>
                        </div>
                        
                        <!-- Запомнить и забыли пароль -->
                        <div class="mb-4 remember-forgot">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="rememberMe">
                                <label class="form-check-label" for="rememberMe">
                                    Запомнить меня
                                </label>
                            </div>
                            <a href="#" class="text-success small">Забыли пароль?</a>
                        </div>
                        
                        <!-- Кнопка входа -->
                        <button type="submit" class="btn btn-success w-100 py-2 mb-3">
                            <i class="bi bi-box-arrow-in-right"></i> Войти
                        </button>
                        
                        <!-- Разделитель -->
                        <div class="divider">
                            или войти через
                        </div>
                        
                        <!-- Социальные сети -->
                        <div class="row g-2 mb-4">
                            <div class="col-md-6">
                                <button type="button" class="btn btn-google w-100">
                                    <i class="bi bi-google"></i> Google
                                </button>
                            </div>
                            <div class="col-md-6">
                                <button type="button" class="btn btn-vk w-100">
                                    <i class="bi bi-share"></i> ВКонтакте
                                </button>
                            </div>
                        </div>
                        
                        <!-- Ссылка на регистрацию -->
                        <div class="text-center">
                            Еще нет аккаунта? <a href="/reg" class="text-success">Зарегистрироваться</a>
                        </div>
                    </form>
                </div>
            </div>
            
            <!-- Дополнительная информация -->
            <div class="text-center mt-4 text-muted">
                <p>Войдя в аккаунт, вы получите доступ к:</p>
                <ul class="list-unstyled">
                    <li><i class="bi bi-check-circle text-success"></i> Вашим объявлениям</li>
                    <li><i class="bi bi-check-circle text-success"></i> Избранным предложениям</li>
                    <li><i class="bi bi-check-circle text-success"></i> Личным сообщениям</li>
                </ul>
            </div>
        </div>
    </div>

    <!-- Подвал -->
    <footer th:replace="~{fragments :: footer}"></footer>

    <div th:replace="~{fragments :: scripts}"></div>
    
    <style>
        .login-container { max-width: 500px; }
        .login-card { border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); overflow: hidden; }
        .login-header { border-radius: 15px 15px 0 0 !important; background: linear-gradient(135deg, #28a745, #20c997); }
        .form-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #6c757d; }
        .form-input { padding-left: 40px; }
        .password-toggle { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #6c757d; }
        .divider { display: flex; align-items: center; text-align: center; color: #6c757d; margin: 20px 0; }
        .divider::before, .divider::after { content: ""; flex: 1; border-bottom: 1px solid #dee2e6; }
        .divider::before { margin-right: 10px; }
        .divider::after { margin-left: 10px; }
        .social-btn { display: flex; align-items: center; justify-content: center; padding: 10px; border-radius: 8px; font-weight: 500; }
        .social-btn i { font-size: 1.2rem; margin-right: 10px; }
        .btn-google { background-color: #fff; color: #757575; border: 1px solid #ddd; }
        .btn-google:hover { background-color: #f8f9fa; }
        .btn-vk { background-color: #0077FF; color: white; }
        .btn-vk:hover { background-color: #0066DD; color: white; }
        .remember-forgot { display: flex; justify-content: space-between; align-items: center; }
    </style>
    <script>
        // Переключение видимости пароля
        const toggleLoginPassword = document.querySelector('#toggleLoginPassword');
        const loginPassword = document.querySelector('#loginPassword');
        
        toggleLoginPassword.addEventListener('click', function() {
            const type = loginPassword.getAttribute('type') === 'password' ? 'text' : 'password';
            loginPassword.setAttribute('type', type);
            this.classList.toggle('bi-eye');
            this.classList.toggle('bi-eye-slash');
        });
        
        // Валидация формы
        /*document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Здесь можно добавить AJAX-запрос для отправки данных на сервер
            // Пример проверки (демо-версия)
            //const email = document.getElementById('loginEmail').value;
            //const password = document.getElementById('loginPassword').value;
            
            if(email && password) {
                alert('Вход выполнен успешно!');
                // window.location.href = 'account.html';
            } else {
                alert('Пожалуйста, заполните все поля!');
            }
        });*/
    </script>
</body>
</html>
